<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch khám của tôi - Clinic Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">&#127973; Clinic Appointment</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="/appointments">Lịch khám của tôi</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm mt-1">Đăng xuất</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">&#128203; Lịch khám của tôi</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div th:if="${appointments == null || appointments.isEmpty()}" class="alert alert-info">
        Bạn chưa có lịch khám nào. <a href="/">Đặt lịch ngay</a>
    </div>

    <table th:if="${appointments != null && !appointments.isEmpty()}" class="table table-striped table-hover shadow-sm">
        <thead class="table-primary">
            <tr>
                <th>#</th>
                <th>Tên bác sĩ</th>
                <th>Khoa</th>
                <th>Ngày khám</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="apt, idx : ${appointments}">
                <td th:text="${idx.index + 1}">1</td>
                <td th:text="${apt.doctor.name}">Doctor</td>
                <td th:text="${apt.doctor.department.name}">Department</td>
                <td th:text="${apt.appointmentDate}">Date</td>
            </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">&larr; Quay lại trang chủ</a>
</div>
</body>
</html>
