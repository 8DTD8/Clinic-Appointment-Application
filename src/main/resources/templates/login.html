<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Clinic Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">&#128274; Đăng nhập</h3>

                    <div th:if="${param.error != null}" class="alert alert-danger">
                        Sai username hoặc password!
                    </div>
                    <div th:if="${param.logout != null}" class="alert alert-info">
                        Đã đăng xuất thành công.
                    </div>
                    <div th:if="${success != null}" class="alert alert-success" th:text="${success}"></div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                    </form>

                    <hr>
                    <a href="/oauth2/authorization/google" class="btn btn-danger w-100">
                        &#127760; Đăng nhập bằng Google
                    </a>

                    <p class="text-center mt-3">
                        Chưa có tài khoản? <a th:href="@{/register}" href="/register">Đăng ký</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
