<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lịch khám - Clinic Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">&#127973; Clinic Appointment</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/appointments">Lịch khám của tôi</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">&#128197; Đặt lịch khám</h3>

                    <div class="text-center mb-3">
                        <img th:src="${doctor.image}" class="rounded" style="width:150px;height:150px;object-fit:cover" alt="Doctor">
                        <h4 class="mt-2" th:text="${doctor.name}">Doctor</h4>
                        <span class="badge bg-primary" th:text="'Chuyên khoa: ' + ${doctor.specialty}"></span>
                        <br>
                        <span class="badge bg-success mt-1" th:text="'Khoa: ' + ${doctor.department.name}"></span>
                    </div>

                    <form th:action="@{/enroll/book}" method="post">
                        <input type="hidden" name="doctorId" th:value="${doctor.id}">
                        <div class="mb-3">
                            <label class="form-label">Chọn ngày khám</label>
                            <input type="date" name="appointmentDate" class="form-control" required
                                   th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                        </div>
                        <button type="submit" class="btn btn-warning w-100">Xác nhận đặt lịch</button>
                    </form>

                    <a href="/" class="btn btn-secondary w-100 mt-2">&larr; Quay lại</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
