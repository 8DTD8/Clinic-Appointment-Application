<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Appointment - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .doctor-card { transition: transform 0.2s; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .doctor-card:hover { transform: translateY(-5px); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
        .doctor-img { width: 100%; height: 250px; object-fit: cover; }
        .search-box { position: relative; }
        .search-box .form-control { border-radius: 25px; padding-left: 40px; }
        .search-box .bi-search { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #6c757d; }
        .search-results-overlay {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 1050;
        }
        .search-results-panel {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 700px; max-height: 75vh;
            background: #fff; border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            overflow-y: auto; z-index: 1051; padding: 20px;
        }
        .search-result-card {
            display: flex; align-items: center; padding: 12px;
            border: 1px solid #e9ecef; border-radius: 12px;
            margin-bottom: 10px; transition: all 0.2s;
        }
        .search-result-card:hover { background: #f0f7ff; border-color: #0d6efd; }
        .search-result-card img {
            width: 70px; height: 70px; border-radius: 50%; object-fit: cover;
            margin-right: 16px; flex-shrink: 0;
        }
        .spinner-search { display: none; }
        @media (max-width: 576px) {
            .search-results-panel { width: 95%; top: 10px; padding: 14px; }
            .search-result-card img { width: 50px; height: 50px; margin-right: 10px; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">&#127973; Clinic Appointment</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" href="/admin/doctors">Quản lý Bác sĩ</a></li>
                <li class="nav-item" sec:authorize="hasRole('PATIENT')"><a class="nav-link" href="/appointments">Lịch khám của tôi</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="nav-link" href="/login">Đăng nhập</a></li>
                <li class="nav-item" sec:authorize="!isAuthenticated()"><a class="nav-link" href="/register">Đăng ký</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-light" sec:authentication="name">User</span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm mt-1">Đăng xuất</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-4">
    <h2 class="text-center mb-3">Danh Sách Bác Sĩ</h2>

    <!-- Ajax Search Box -->
    <div class="row justify-content-center mb-4">
        <div class="col-md-6 col-lg-5">
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" class="form-control form-control-lg"
                       placeholder="Tìm kiếm bác sĩ theo tên..." autocomplete="off">
            </div>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="row">
        <div th:each="doctor : ${doctorPage.content}" class="col-md-12 mb-3">
            <div class="card doctor-card">
                <div class="row g-0">
                    <div class="col-md-3">
                        <img th:src="${doctor.image != null && !doctor.image.isEmpty()} ? ${doctor.image} : 'https://via.placeholder.com/250x250?text=Doctor'"
                             class="doctor-img rounded-start" alt="Doctor Image">
                    </div>
                    <div class="col-md-9">
                        <div class="card-body">
                            <h4 class="card-title" th:text="${doctor.name}">Doctor Name</h4>
                            <p class="card-text">
                                <span class="badge bg-primary rounded-pill me-2">
                                    Chuyên khoa: <span th:text="${doctor.specialty}"></span>
                                </span>
                            </p>
                            <p class="card-text">
                                <span class="badge bg-success rounded-pill">
                                    Khoa: <span th:text="${doctor.department.name}"></span>
                                </span>
                            </p>
                            <div sec:authorize="hasRole('PATIENT')">
                                <a th:href="@{/enroll/book/{id}(id=${doctor.id})}" class="btn btn-warning btn-sm mt-2">&#128197; Đặt lịch</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${doctorPage.totalElements == 0}" class="text-center py-5">
        <h4 class="text-muted">Chưa có bác sĩ nào trong hệ thống.</h4>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" aria-label="Page navigation" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/home(page=${currentPage - 1})}">&laquo; Trước</a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" class="page-item" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/home(page=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/home(page=${currentPage + 1})}">Sau &raquo;</a>
            </li>
        </ul>
    </nav>

    <div th:if="${totalPages > 0}" class="text-center text-muted mb-4">
        Trang <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span>
        (Tổng: <span th:text="${doctorPage.totalElements}">0</span> bác sĩ)
    </div>
</div>

<!-- Ajax Search Results Overlay -->
<div id="searchOverlay" class="search-results-overlay" onclick="closeSearch()">
    <div class="search-results-panel" onclick="event.stopPropagation()">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0"><i class="bi bi-search"></i> Kết quả tìm kiếm</h5>
            <button class="btn btn-sm btn-outline-secondary rounded-circle" onclick="closeSearch()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div id="searchCount" class="text-muted small mb-2"></div>
        <div class="text-center spinner-search" id="searchSpinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Đang tìm...</span>
            </div>
        </div>
        <div id="searchResults"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const searchInput = document.getElementById('searchInput');
    const overlay = document.getElementById('searchOverlay');
    const resultsDiv = document.getElementById('searchResults');
    const countDiv = document.getElementById('searchCount');
    const spinner = document.getElementById('searchSpinner');
    let debounceTimer;

    searchInput.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        const keyword = this.value.trim();
        if (keyword.length < 1) {
            closeSearch();
            return;
        }
        debounceTimer = setTimeout(() => searchDoctors(keyword), 300);
    });

    searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSearch();
    });

    function searchDoctors(keyword) {
        overlay.style.display = 'block';
        spinner.style.display = 'block';
        resultsDiv.innerHTML = '';
        countDiv.textContent = '';

        fetch('/api/doctors/search?keyword=' + encodeURIComponent(keyword))
            .then(res => res.json())
            .then(doctors => {
                spinner.style.display = 'none';
                countDiv.textContent = 'Tìm thấy ' + doctors.length + ' bác sĩ';

                if (doctors.length === 0) {
                    resultsDiv.innerHTML = '<div class="text-center py-4 text-muted">' +
                        '<i class="bi bi-emoji-frown" style="font-size:2rem"></i>' +
                        '<p class="mt-2">Không tìm thấy bác sĩ nào phù hợp.</p></div>';
                    return;
                }

                let html = '';
                doctors.forEach(doc => {
                    const img = doc.image || 'https://via.placeholder.com/70x70?text=BS';
                    const deptName = doc.department ? doc.department.name : '';
                    html += '<div class="search-result-card">' +
                        '<img src="' + escapeHtml(img) + '" alt="Doctor">' +
                        '<div class="flex-grow-1">' +
                        '<h6 class="mb-1">' + escapeHtml(doc.name) + '</h6>' +
                        '<span class="badge bg-primary me-1">Chuyên khoa: ' + escapeHtml(doc.specialty) + '</span> ' +
                        '<span class="badge bg-success">Khoa: ' + escapeHtml(deptName) + '</span>' +
                        '</div>' +
                        '<a href="/enroll/book/' + doc.id + '" class="btn btn-warning btn-sm ms-2">Đặt lịch</a>' +
                        '</div>';
                });
                resultsDiv.innerHTML = html;
            })
            .catch(() => {
                spinner.style.display = 'none';
                resultsDiv.innerHTML = '<div class="text-center text-danger py-3">Lỗi khi tìm kiếm. Vui lòng thử lại.</div>';
            });
    }

    function closeSearch() {
        overlay.style.display = 'none';
        resultsDiv.innerHTML = '';
        countDiv.textContent = '';
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
