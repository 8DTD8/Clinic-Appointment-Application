<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${doctor.id != null} ? 'Sửa bác sĩ' : 'Thêm bác sĩ'">Form Bác sĩ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">&#127973; Clinic Admin</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/doctors">Quản lý Bác sĩ</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4" th:text="${doctor.id != null} ? 'Sửa thông tin bác sĩ' : 'Thêm bác sĩ mới'">Form</h3>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="${doctor.id != null} ? @{/admin/doctors/edit/{id}(id=${doctor.id})} : @{/admin/doctors/create}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Tên bác sĩ</label>
                            <input type="text" name="name" class="form-control" th:value="${doctor.name}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Chuyên khoa</label>
                            <input type="text" name="specialty" class="form-control" th:value="${doctor.specialty}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">URL Hình ảnh</label>
                            <input type="text" name="image" class="form-control" th:value="${doctor.image}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Khoa</label>
                            <select name="departmentId" class="form-select" required>
                                <option value="">-- Chọn khoa --</option>
                                <option th:each="dept : ${departments}"
                                        th:value="${dept.id}"
                                        th:text="${dept.name}"
                                        th:selected="${doctor.department != null && doctor.department.id == dept.id}">
                                </option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100"
                                th:text="${doctor.id != null} ? 'Cập nhật' : 'Thêm mới'">Submit</button>
                    </form>

                    <a href="/admin/doctors" class="btn btn-secondary w-100 mt-2">&larr; Quay lại</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
