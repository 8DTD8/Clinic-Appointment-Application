<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Bác sĩ - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">&#127973; Clinic Admin</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="/admin/doctors">Quản lý Bác sĩ</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm mt-1">Đăng xuất</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>&#128105;&#8205;&#9877;&#65039; Quản lý Bác sĩ</h2>
        <a href="/admin/doctors/create" class="btn btn-success">+ Thêm bác sĩ</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${doctors.isEmpty()}" class="alert alert-info">
        Chưa có bác sĩ nào.
    </div>

    <table th:if="${!doctors.isEmpty()}" class="table table-striped table-hover shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Hình ảnh</th>
                <th>Tên bác sĩ</th>
                <th>Chuyên khoa</th>
                <th>Khoa</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="doctor, idx : ${doctors}">
                <td th:text="${idx.index + 1}">1</td>
                <td>
                    <img th:src="${doctor.image}" style="width:60px;height:60px;object-fit:cover;border-radius:8px" alt="Doctor">
                </td>
                <td th:text="${doctor.name}">Name</td>
                <td th:text="${doctor.specialty}">Specialty</td>
                <td th:text="${doctor.department.name}">Department</td>
                <td>
                    <a th:href="@{/admin/doctors/edit/{id}(id=${doctor.id})}" class="btn btn-primary btn-sm">Sửa</a>
                    <a th:href="@{/admin/doctors/delete/{id}(id=${doctor.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
